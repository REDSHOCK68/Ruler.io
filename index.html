<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruler.io | Hükümdar Paneli</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container" class="overlay">
        <div class="auth-box">
            <h1>RULER<span class="dot-io">.io</span></h1>
            <input type="text" id="username-input" maxlength="15" placeholder="Hükümdar İsmi...">
            <button onclick="handleLogin()">YOLCULUĞA BAŞLA</button>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div class="top-bar">
            <div class="left-group">
                <span id="display-name">👑 Yükleniyor...</span>
                <button id="save-btn" onclick="saveToCloud()">💾 Save Progress</button>
            </div>
            <div class="right-group">
                💰 Gold: <span id="gold-count">200</span>
            </div>
        </div>

        <div id="main-menu" class="menu-view">
            <button class="menu-btn orange">ORDU</button>
            <button class="menu-btn green" onclick="switchMenu('investments-menu')">YATIRIMLAR</button>
            <button class="menu-btn blue">ÜLKELER</button>
        </div>

        <div id="investments-menu" class="menu-view hidden">
            <div class="menu-header">
                <h2>Şehir Yatırımları</h2>
                <button id="create-city-btn" onclick="createCity()">
                    🏙️ Create a City (<span id="city-price">50</span> 💰)
                </button>
            </div>
            
            <div id="city-slots" class="slots-container">
                </div>
            <p class="esc-hint">[ESC] ile geri dön</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
